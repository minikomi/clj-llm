* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0d1117;
  color: #e6edf3;
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Mono', monospace;
  font-size: 12px;
  overflow-x: hidden;
}

.page-title {
  padding: 14px 20px 10px;
  border-bottom: 1px solid #21262d;
  display: flex;
  align-items: baseline;
  gap: 16px;
}
.page-title h1 { font-size: 13px; color: #8b949e; font-weight: normal; letter-spacing: .05em; }
.page-title .q { font-size: 11px; color: #388bfd; flex: 1; }

.controls {
  padding: 8px 20px;
  border-bottom: 1px solid #21262d;
  display: flex;
  gap: 10px;
  align-items: center;
}
button {
  background: #21262d;
  border: 1px solid #30363d;
  color: #e6edf3;
  padding: 4px 12px;
  border-radius: 4px;
  cursor: pointer;
  font-family: inherit;
  font-size: 11px;
}
button:hover { background: #30363d; }
button.active { background: #388bfd; border-color: #388bfd; color: #fff; }
.speed-label { color: #8b949e; font-size: 11px; }
.step-counter { color: #8b949e; font-size: 11px; margin-left: auto; }

.main {
  display: flex;
  height: calc(100vh - 84px);
}

/* ── Left: diagram ── */
.diagram-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}
svg {
  width: 100%;
  height: 100%;
}

/* ── Right: log ── */
.log-panel {
  width: 280px;
  border-left: 1px solid #21262d;
  display: flex;
  flex-direction: column;
}
.log-panel h2 {
  font-size: 11px;
  color: #8b949e;
  padding: 8px 12px;
  border-bottom: 1px solid #21262d;
  font-weight: normal;
  letter-spacing: .05em;
}
.log-entries {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
}
.log-entry {
  padding: 3px 12px;
  font-size: 10px;
  line-height: 1.5;
  opacity: 0.4;
  transition: opacity 0.3s;
  border-left: 2px solid transparent;
}
.log-entry.active {
  opacity: 1;
  border-left-color: #388bfd;
  background: #161b22;
}
.log-entry.done { opacity: 0.8; }
.log-entry .evt-id { color: #58a6ff; }
.log-entry .evt-type-search { color: #3fb950; }
.log-entry .evt-type-llm   { color: #bc8cff; }
.log-entry .evt-type-dag   { color: #388bfd; }
.log-entry .evt-type-sys   { color: #8b949e; }

/* ── Node states ── */
.node-idle    { opacity: 0.35; }
.node-ready   { opacity: 1; }
.node-running { opacity: 1; }
.node-done    { opacity: 1; }

/* Legend */
.legend {
  position: absolute;
  bottom: 14px;
  left: 14px;
  font-size: 10px;
  color: #8b949e;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.leg { display: flex; align-items: center; gap: 7px; }
.leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.leg-line { width: 22px; height: 2px; flex-shrink: 0; }
</style>
</head>

byId['icf/nif_analysis'].x       = 360; byId['icf/nif_analysis'].y       = 210;
byId['icf/tech_analysis'].x      = 420; byId['icf/tech_analysis'].y      = 210;
byId['icf/challenges_analysis'].x= 500; byId['icf/challenges_analysis'].y= 210;
byId['icf/viability_analysis'].x = 560; byId['icf/viability_analysis'].y = 210;
byId['icf/nif_recent'].x         = 338; byId['icf/nif_recent'].y         = 340;
byId['icf/nif_ignition'].x       = 375; byId['icf/nif_ignition'].y       = 340;
byId['icf/laser_fusion'].x       = 418; byId['icf/laser_fusion'].y       = 340;
byId['icf/competing_tech'].x     = 462; byId['icf/competing_tech'].y     = 340;
byId['icf/icf_funding'].x        = 492; byId['icf/icf_funding'].y        = 340;
byId['icf/technical_challenges'].x=535; byId['icf/technical_challenges'].y=340;
byId['icf/commercial_path'].x    = 578; byId['icf/commercial_path'].y    = 340;

// prv sub-dag (right column, x~735)
byId['prv/final_synthesis'].x = 735; byId['prv/final_synthesis'].y = 118;
byId['prv/cfs_analysis'].x    = 630; byId['prv/cfs_analysis'].y    = 210;
byId['prv/tae_analysis'].x    = 735; byId['prv/tae_analysis'].y    = 210;
byId['prv/helion_analysis'].x = 840; byId['prv/helion_analysis'].y = 210;
byId['prv/cfs_tech'].x      = 598; byId['prv/cfs_tech'].y      = 340;
byId['prv/cfs_timeline'].x  = 620; byId['prv/cfs_timeline'].y  = 340;
byId['prv/cfs_funding'].x   = 642; byId['prv/cfs_funding'].y   = 340;
byId['prv/cfs_comm'].x      = 664; byId['prv/cfs_comm'].y      = 340;
byId['prv/tae_tech'].x      = 700; byId['prv/tae_tech'].y      = 340;
byId['prv/tae_timeline'].x  = 722; byId['prv/tae_timeline'].y  = 340;
byId['prv/tae_funding'].x   = 744; byId['prv/tae_funding'].y   = 340;
byId['prv/tae_comm'].x      = 766; byId['prv/tae_comm'].y      = 340;
byId['prv/helion_tech'].x      = 800; byId['prv/helion_tech'].y      = 340;
byId['prv/helion_timeline'].x  = 822; byId['prv/helion_timeline'].y  = 340;
byId['prv/helion_funding'].x   = 844; byId['prv/helion_funding'].y   = 340;
byId['prv/helion_comm'].x      = 868; byId['prv/helion_comm'].y      = 340;

// ─────────────────────────────────────────────────────────────────
// Render
// ─────────────────────────────────────────────────────────────────

const COLORS = { search:'#238636', llm:'#6e40c9', dag:'#1158c7' };
const STROKES = { search:'#3fb950', llm:'#bc8cff', dag:'#388bfd' };
const R = { search:6, llm:10, dag:14 };

const svg = document.getElementById('svg');
svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

function el(tag, attrs={}, parent=svg) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
  parent.appendChild(e);
  return e;
}

// defs
const defs = el('defs');
for (const [id, col] of [['arr','#30363d'],['arr-dag','#388bfd'],['arr-spawn','#388bfd']]) {
  const m = el('marker', {id, markerWidth:6, markerHeight:6, refX:6, refY:3, orient:'auto'}, defs);
  el('path', {d:'M0,0 L0,6 L6,3 z', fill:col}, m);
}

// sub-dag bounding boxes
const boxes = [
  { group:'tok', x1:8,   y1:88,  x2:330, y2:368, label:'sub-dag: tokamak (depth=1)' },
  { group:'icf', x1:318, y1:88,  x2:608, y2:368, label:'sub-dag: inertial confinement (depth=1)' },
  { group:'prv', x1:596, y1:88,  x2:910, y2:368, label:'sub-dag: private ventures (depth=1)' },
];
const boxEls = {};
for (const b of boxes) {
  const g = el('g');
  const rect = el('rect', { x:b.x1, y:b.y1, width:b.x2-b.x1, height:b.y2-b.y1,
    rx:8, fill:'none', stroke:'#388bfd', 'stroke-width':1, 'stroke-dasharray':'5,3', opacity:0.2 }, g);
  el('text', { x:b.x1+7, y:b.y1+13, fill:'#388bfd', 'font-size':9, opacity:0.6,
    'font-family':'monospace' }, g).textContent = b.label;
  boxEls[b.group] = { g, rect };
}

// edges
const edgeEls = {};
for (const e of EDGES) {
  const s = byId[e.s], t = byId[e.t];
  if (!s||!t) continue;
  const key = e.s+'→'+e.t;
  const isSpawn = e.spawn;
  const isDag = e.dag;
  // bezier: s→t bottom-to-top in our layout means s.y > t.y mostly
  const mx = (s.x+t.x)/2, my = (s.y+t.y)/2;
  const dx = t.x-s.x, dy = t.y-s.y;
  const d = `M${s.x},${s.y} C${s.x},${s.y+dy*0.55} ${t.x},${t.y-dy*0.55} ${t.x},${t.y}`;
  const stroke = isSpawn||isDag ? '#388bfd' : '#30363d';
  const dash = isSpawn ? '5,4' : (isDag ? '3,3' : 'none');
  const marker = isSpawn||isDag ? 'url(#arr-dag)' : 'url(#arr)';
  const path = el('path', {
    d, fill:'none', stroke, 'stroke-width': isSpawn ? 1.5 : 1.2,
    'stroke-dasharray': dash, 'marker-end': marker, opacity: 0.25,
  });
  edgeEls[key] = path;
}

// nodes
const nodeEls = {};
for (const n of NODES) {
  const g = el('g', { transform:`translate(${n.x},${n.y})`, style:'cursor:default' });
  const r = R[n.type];
  const circ = el('circle', {
    r, fill: COLORS[n.type], stroke: STROKES[n.type],
    'stroke-width': n.type==='dag' ? 2.5 : 1.5, opacity:0.3
  }, g);
  // label below
  const txt = el('text', {
    y: r+10, 'text-anchor':'middle', fill:'#8b949e',
    'font-size': n.type==='search' ? 7.5 : 9,
    'font-family':'monospace'
  }, g);
  txt.textContent = n.label;
  // shared marker
  if (n.shared) {
    const star = el('text', { x:r+1, y:-r+1, 'font-size':8, fill:'#f0883e', 'font-family':'monospace' }, g);
    star.textContent = '★';
  }
  nodeEls[n.id] = { g, circ, txt };
}

// ─────────────────────────────────────────────────────────────────
// State machine
// ─────────────────────────────────────────────────────────────────

const nodeState = {}; // idle | ready | running | done
for (const n of NODES) nodeState[n.id] = 'idle';

function applyNodeState(id, state) {
  nodeState[id] = state;
  const { circ, txt } = nodeEls[id];
  const n = byId[id];
  if (state === 'idle') {
    circ.setAttribute('opacity', 0.25);
    txt.setAttribute('fill', '#555');
  } else if (state === 'ready') {
    circ.setAttribute('opacity', 0.8);
    circ.setAttribute('stroke-width', n.type==='dag'?3:2);
    txt.setAttribute('fill', '#8b949e');
  } else if (state === 'running') {
    circ.setAttribute('opacity', 1);
    circ.setAttribute('fill', '#f0883e');
    circ.setAttribute('stroke', '#ffa657');
    circ.setAttribute('stroke-width', 3);
    txt.setAttribute('fill', '#ffa657');
  } else if (state === 'done') {
    circ.setAttribute('opacity', 1);
    circ.setAttribute('fill', COLORS[n.type]);
    circ.setAttribute('stroke', STROKES[n.type]);
    circ.setAttribute('stroke-width', n.type==='dag'?2.5:1.5);
    txt.setAttribute('fill', '#e6edf3');
  }
}

function applyEdgeActive(s, t, active) {
  const key = s+'→'+t;
  const p = edgeEls[key];
  if (!p) return;
  p.setAttribute('opacity', active ? 1 : 0.2);
  p.setAttribute('stroke-width', active ? 2.5 : 1.2);
}

// ─────────────────────────────────────────────────────────────────
// Log
// ─────────────────────────────────────────────────────────────────
const logEl = document.getElementById('log');
const logEntryEls = [];

function buildLog() {
  logEl.innerHTML = '';
  logEntryEls.length = 0;
  for (const [i, ev] of EVENTS.entries()) {
    const div = document.createElement('div');
    div.className = 'log-entry';
    const typeClass = ev.type === 'search-start' || ev.type === 'search-done' ? 'evt-type-search'
      : ev.type === 'llm-wait' || ev.type === 'llm-done' ? 'evt-type-llm'
      : ev.type === 'spawn' || ev.type === 'dag-done' ? 'evt-type-dag' : 'evt-type-sys';
    const prefix = ev.type === 'search-start' ? '⬡ search' :
      ev.type === 'search-done' ? '✓ search done' :
      ev.type === 'llm-wait'    ? '⏳ llm generating' :
      ev.type === 'llm-done'    ? '✓ llm done' :
      ev.type === 'spawn'       ? '⬡ dag spawn' :
      ev.type === 'dag-done'    ? '✓ dag done' : '·';
    div.innerHTML = ev.id
      ? `<span class="${typeClass}">${prefix}:</span> <span class="evt-id">${ev.id.replace(/^(tok|icf|prv)\//,'')}</span>${ev.msg?' — '+ev.msg:''}`
      : `<span class="evt-type-sys">${ev.msg}</span>`;
    logEl.appendChild(div);
    logEntryEls.push(div);
  }
}
buildLog();

// ─────────────────────────────────────────────────────────────────
// Playback
// ─────────────────────────────────────────────────────────────────
let currentStep = -1;
let playing = false;
let speed = 1;
let timer = null;

const STEP_MS = { 1: 600, 2: 300, 4: 150 };

function reset() {
  currentStep = -1;
  for (const n of NODES) applyNodeState(n.id, 'idle');
  for (const e of EDGES) applyEdgeActive(e.s, e.t, false);
  for (const div of logEntryEls) { div.classList.remove('active','done'); }
  document.getElementById('step-counter').textContent = `step 0 / ${EVENTS.length}`;
}

function applyEvent(ev) {
  if (ev.type === 'spawn') {
    applyNodeState(ev.id, 'running');
  } else if (ev.type === 'search-start') {
    applyNodeState(ev.id, 'running');
  } else if (ev.type === 'search-done') {
    applyNodeState(ev.id, 'done');
    // activate edges from this node
    for (const e of EDGES) if (e.s === ev.id) applyEdgeActive(e.s, e.t, true);
  } else if (ev.type === 'llm-wait') {
    applyNodeState(ev.id, 'running');
  } else if (ev.type === 'llm-done') {
    applyNodeState(ev.id, 'done');
    for (const e of EDGES) if (e.s === ev.id) applyEdgeActive(e.s, e.t, true);
  } else if (ev.type === 'dag-done') {
    applyNodeState(ev.id, 'done');
    for (const e of EDGES) if (e.s === ev.id) applyEdgeActive(e.s, e.t, true);
  }
}

function stepForward() {
  if (currentStep >= EVENTS.length - 1) { stopPlay(); return; }
  currentStep++;
  const ev = EVENTS[currentStep];
  applyEvent(ev);
  // log
  if (currentStep > 0) logEntryEls[currentStep-1].classList.remove('active');
  logEntryEls[currentStep].classList.add('active');
  for (let i = 0; i < currentStep; i++) logEntryEls[i].classList.add('done');
  logEntryEls[currentStep].scrollIntoView({ block:'nearest' });
  document.getElementById('step-counter').textContent = `step ${currentStep+1} / ${EVENTS.length}`;
}

function startPlay() {
  if (playing) return;
  playing = true;
  document.getElementById('btn-play').textContent = '⏸ Pause';
  document.getElementById('btn-play').classList.add('active');
  function tick() {
    if (!playing) return;
    stepForward();
    if (currentStep < EVENTS.length - 1) timer = setTimeout(tick, STEP_MS[speed]);
    else stopPlay();
  }
  timer = setTimeout(tick, STEP_MS[speed]);
}

function stopPlay() {
  playing = false;
  clearTimeout(timer);
  document.getElementById('btn-play').textContent = '▶ Play';
  document.getElementById('btn-play').classList.remove('active');
}

document.getElementById('btn-play').onclick = () => playing ? stopPlay() : startPlay();
document.getElementById('btn-step').onclick = () => { stopPlay(); stepForward(); };
document.getElementById('btn-reset').onclick = () => { stopPlay(); reset(); };

for (const [spd, id] of [[1,'spd-1'],[2,'spd-2'],[4,'spd-4']]) {
  document.getElementById(id).onclick = () => {
    speed = spd;
    for (const s of [1,2,4]) document.getElementById('spd-'+s).classList.toggle('active', s===spd);
  };
}

document.getElementById('step-counter').textContent = `step 0 / ${EVENTS.length}`;
</script>
