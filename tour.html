<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Tour of clj-llm</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css">
  <style>
    :root { --bg: #fdfdfd; --fg: #1a1a1a; --muted: #555; --border: #ddd; --code-bg: #f6f8fa; --link: #0969da; }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0d1117; --fg: #e6edf3; --muted: #8b949e; --border: #30363d; --code-bg: #161b22; --link: #58a6ff; }
    }
    * { box-sizing: border-box; }
    html { background: var(--bg); color: var(--fg); }
    body {
      max-width: 44em; margin: 0 auto;
      padding: 2em 1.5em 4em;
      font: 17px/1.65 -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }
    h1 { font-size: 2em; margin: 1em 0 0.3em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
    h2 { font-size: 1.45em; margin: 1.8em 0 0.5em; border-bottom: 1px solid var(--border); padding-bottom: 0.25em; }
    h3 { font-size: 1.15em; margin: 1.4em 0 0.4em; }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }
    code { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: 0.88em; }
    :not(pre) > code { background: var(--code-bg); padding: 0.15em 0.35em; border-radius: 4px; }
    pre { background: var(--code-bg); border-radius: 8px; padding: 1em 1.2em; overflow-x: auto; line-height: 1.5; }
    pre code { font-size: 0.85em; background: none; padding: 0; }
    table { border-collapse: collapse; width: 100%; margin: 1em 0; font-size: 0.92em; }
    th, td { border: 1px solid var(--border); padding: 0.5em 0.75em; text-align: left; }
    th { background: var(--code-bg); font-weight: 600; }
    blockquote { border-left: 4px solid var(--border); margin: 1em 0; padding: 0.3em 1em; color: var(--muted); }
    hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }
    p, li { overflow-wrap: break-word; }
    #content { opacity: 0; transition: opacity 0.15s; }
    #content.loaded { opacity: 1; }
  </style>
</head>
<body>
  <div id="content"></div>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/languages/clojure.min.js"></script>
  <script>
    window.addEventListener('load', async () => {
      const r = await fetch('TOUR.md?_=' + Date.now());
      const md = await r.text();
      const el = document.getElementById('content');
      el.innerHTML = marked.parse(md);
      el.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
      el.classList.add('loaded');
    });
  </script>
</body>
</html>
